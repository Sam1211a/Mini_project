<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    display:flex;
    background:#f5f7fb;
}

/* Sidebar (same as yours) */
.sidebar{
    width:260px;
    height:100vh;
    background:#fff;
    padding:25px;
    border-right:1px solid #eee;
    display:flex;
    flex-direction:column;
}

.logo{
    font-size:20px;
    font-weight:bold;
    color:#4CAF50;
    margin-bottom:25px;
}

.profile{
    text-align:center;
    padding:20px;
    border-radius:12px;
    background:#f9faff;
}

.profile img{
    width:80px;
    height:80px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:10px;
}

.menu{margin-top:30px;}

.menu a{
    display:block;
    padding:10px;
    margin-bottom:8px;
    border-radius:8px;
    text-decoration:none;
    color:#333;
}

.menu a:hover{
    background:#e8f5e9;
    color:#4CAF50;
}

.logout{
    margin-top:auto;
    padding:10px;
    text-align:center;
    background:#ffe5e5;
    color:#d63031;
    border-radius:8px;
    text-decoration:none;
}

/* Main */
.main{
    flex:1;
    padding:30px;
}

/* Cards */
.cards{
    display:flex;
    gap:20px;
    margin-bottom:30px;
}

.card{
    flex:1;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
    text-align:center;
}

.card h2{
    font-size:28px;
    color:#4CAF50;
}

.card p{
    color:#777;
    margin-top:5px;
}

/* Chart box */
.chart-box{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo">Dashboard</div>

    <div class="profile">
        <img src="{{.ProfileImage}}" onerror="this.src='https://via.placeholder.com/80'">
        <h3>{{.Name}}</h3>
        <p>{{.Email}}</p>
    </div>

    <div class="menu">
        <a href="/dashboard" style="background:#e8f5e9;color:#4CAF50;">Dashboard</a>
        <a href="/user_post">My Post</a>
        <a href="/edit_profile">Edit Profile</a>
    </div>

    <a href="/login" class="logout">Logout</a>
</div>

<!-- Main -->
<div class="main">

    <!-- Cards -->
    <div class="cards">
        <div class="card">
            <h2>{{.TotalUsers}}</h2>
            <p>Total Users</p>
        </div>

        <div class="card">
            <h2>{{.TotalPosts}}</h2>
            <p>Total Posts</p>
        </div>
    </div>

    <!-- Chart -->
    <div class="chart-box">
        <canvas id="myChart"></canvas>
    </div>

</div>

<script>
const ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Users', 'Posts'],
        datasets: [{
            label: 'Statistics',
            data: [{{.TotalUsers}}, {{.TotalPosts}}],
            backgroundColor: ['#4CAF50', '#2196F3']
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                display: false
            }
        }
    }
});
</script>

</body>
</html>
