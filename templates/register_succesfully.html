<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Success</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    display:flex;
    background:#f5f7fb;
}

/* Sidebar */
.sidebar{
    width:260px;
    height:100vh;
    background:#fff;
    padding:25px;
    border-right:1px solid #eee;
    display:flex;
    flex-direction:column;
}

.logo{
    font-size:20px;
    font-weight:bold;
    color:#4CAF50;
    margin-bottom:25px;
}

.sidebar-text{
    font-size:13px;
    color:#666;
}

/* Main */
.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Card */
.success-card{
    width:450px;
    background:#fff;
    padding:40px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
    text-align:center;
}

/* Icon */
.icon{
    font-size:60px;
    color:#4CAF50;
    margin-bottom:15px;
}

/* Title */
.success-card h1{
    font-size:24px;
    color:#333;
    margin-bottom:10px;
}

/* text */
.success-card p{
    font-size:14px;
    color:#777;
    line-height:1.6;
    margin-bottom:25px;
}

/* button */
.btn{
    display:inline-block;
    padding:10px 25px;
    background:#4CAF50;
    color:#fff;
    text-decoration:none;
    border-radius:6px;
    font-weight:600;
    transition:0.3s;
}

.btn:hover{
    background:#3aa043;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo">My App</div>
    <p class="sidebar-text">
        Your account has been created successfully. Now you can login and use dashboard features.
    </p>
</div>

<!-- Main -->
<div class="main">

    <div class="success-card">

        <div class="icon">✔</div>

        <h1>Registration Successful!</h1>

        <p>
            Your account has been created successfully.<br>
            Click below to login and start using your dashboard.
        </p>

        <a href="/login" class="btn">Go to Login</a>

    </div>

</div>

</body>
</html>
