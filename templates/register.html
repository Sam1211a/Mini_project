<!DOCTYPE html>
<html>
<head>
    <title>Register Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#74ebd5,#ACB6E5);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            padding:40px;
            width:400px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .input-group{
            margin-bottom:15px;
        }

        .input-group label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
            color:#555;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:14px;
            transition:0.3s;
        }

        .input-group input:focus{
            border-color:#74ebd5;
            outline:none;
            box-shadow:0 0 5px rgba(116,235,213,0.5);
        }

        button{
            width:100%;
            padding:12px;
            background:#74ebd5;
            border:none;
            color:white;
            font-size:16px;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#5ecdc3;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Registration Form</h2>

        <form method="post" action="/register">

            <div class="input-group">
                <label>Name</label>
                <input type="text" name="name" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="text" name="email" required>
            </div>

            <div class="input-group">
                <label>Country</label>
                <input type="text" name="country" required>
            </div>

            <div class="input-group">
                <label>Phone</label>
                <input type="text" name="mobile" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="pass" required>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" name="confpass" required>
            </div>

            <button type="submit">Register</button>

        </form>
    </div>

</body>
</html>
