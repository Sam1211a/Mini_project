<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Profile</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    background: #f4f6f9;
}

/* Sidebar */
.sidebar {
    width: 260px;
    height: 100vh;
    background: #ffffff;
    padding: 20px;
    border-right: 1px solid #ddd;
    display: flex;
    flex-direction: column;
}

.profile {
    text-align: center;
    padding-bottom: 15px;
    border-bottom: 1px solid #eee;
}

.profile img {
    width: 90px;
    border-radius: 50%;
    margin-bottom: 10px;
}

.profile h3 {
    margin: 5px 0;
    color: #3b5be0;
}

/* Form */
.form-group {
    margin: 10px 0;
    text-align: left;
}

.form-group label {
    font-size: 13px;
    font-weight: bold;
}

.form-group input {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

/* Button */
.save-btn {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    background: #4a6cf7;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.save-btn:hover {
    background: #3b5be0;
}

/* Menu */
.menu {
    margin-top: 20px;
}

.menu a {
    display: block;
    padding: 10px;
    border-radius: 6px;
    text-decoration: none;
    color: black;
}

.menu a:hover {
    background: #f0f3ff;
    color: #4a6cf7;
}

/* Bottom */
.bottom {
    margin-top: auto;
}

.logout {
    display: block;
    padding: 10px;
    background: #f8d7da;
    color: #d63031;
    text-align: center;
    border-radius: 6px;
    text-decoration: none;
}

/* Main */
.main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 10px;
}
</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2 style="color: #552ba8;">Dashboard</h2>

    <!-- Profile Edit Form -->
    <div class="profile">
        <img src="https://via.placeholder.com/90">
        <h3>Edit Profile</h3>

        <form method="POST" action="/edit_profile">
            
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" value="{{.Name}}">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{.Email}}">
            </div>

            <div class="form-group">
                <label>Country</label>
                <input type="text" name="country" value="{{.Country}}">
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phn" value="{{.Phn}}">
            </div>

            <button type="submit" class="save-btn">Save Changes</button>
        </form>
    </div>

    <!-- Menu -->
    <div class="menu">
        <a href="#">Orders</a>
    </div>

    <!-- Logout -->
    <div class="bottom">
        <a href="/login" class="logout">Logout</a>
    </div>
</div>

<!-- Main -->
<div class="main">
    <div class="box">
        <h2>Edit Your Profile</h2>
        <p>এখান থেকে তুমি তোমার তথ্য update করতে পারবে</p>
    </div>
</div>

</body>
</html>
