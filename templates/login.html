<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    display:flex;
    background:#f5f7fb;
}

/* Sidebar */
.sidebar{
    width:260px;
    height:100vh;
    background:#fff;
    padding:25px;
    border-right:1px solid #eee;
    display:flex;
    flex-direction:column;
}

.logo{
    font-size:20px;
    font-weight:bold;
    color:#4CAF50;
    margin-bottom:25px;
}

.sidebar-text{
    font-size:13px;
    color:#666;
}

/* Main */
.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Card */
.login-card{
    width:420px;
    background:#fff;
    padding:35px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.login-card h1{
    text-align:center;
    font-size:24px;
    margin-bottom:5px;
    color:#333;
}

.login-card p{
    text-align:center;
    font-size:13px;
    color:#777;
    margin-bottom:25px;
}

/* input */
.form-group{
    margin-bottom:15px;
}

.form-group label{
    font-size:13px;
    font-weight:600;
    color:#444;
}

.form-group input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ddd;
    border-radius:6px;
    outline:none;
}

.form-group input:focus{
    border-color:#4CAF50;
}

/* button */
.btn{
    width:100%;
    padding:10px;
    background:#4CAF50;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
}

.btn:hover{
    background:#3aa043;
}

/* error */
.error{
    color:red;
    font-size:12px;
    margin-top:5px;
}

/* link */
.link{
    text-align:center;
    margin-top:15px;
    font-size:13px;
}

.link a{
    color:#4CAF50;
    text-decoration:none;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo">My App</div>
    <p class="sidebar-text">
        Login to access your dashboard, posts and profile system.
    </p>
</div>

<!-- Main -->
<div class="main">

    <div class="login-card">

        <h1>Welcome Back</h1>
        <p>Login to your account</p>

        <form method="post" action="/login">

            <div class="form-group">
                <label>Email</label>
                <input type="text" name="emil" value="{{.Email}}" required>
                {{if .EmailError}}
                <p class="error">{{.EmailError}}</p>
                {{end}}
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="pass" required>
                {{if .PassEr}}
                <p class="error">{{.PassEr}}</p>
                {{end}}
            </div>

            <button class="btn" type="submit">Login</button>

            <div class="link">
                Don't have an account? <a href="/register">Register</a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
